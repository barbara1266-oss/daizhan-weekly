<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大展分會｜週報填寫系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #F1EFE8; padding: 1rem; }
h1.site-title { text-align: center; font-size: 20px; font-weight: 600; color: #4F46E5; margin-bottom: 1.5rem; }
.form-wrap { max-width: 100%; margin: 0 auto 2.5rem; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
.top-bar { background: #4F46E5; padding: 1rem 1.25rem; }
.top-bar h2 { font-size: 18px; font-weight: 600; color: #fff; }
.top-bar p { font-size: 12px; color: #E0DEFF; margin-top: 3px; line-height: 1.7; }
.body { padding: 1rem 1rem 1.25rem; }

.table-wrap { border: 1px solid #E5E3DC; border-radius: 10px; overflow: hidden; margin-bottom: 12px; width: 100%; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead tr { background: #F1EFE8; }
th { padding: 10px 4px; font-size: 11px; font-weight: 600; color: #888780; text-align: center; border-bottom: 1px solid #E5E3DC; line-height: 1.4; }
th.nm { text-align: left; padding-left: 10px; width: 13%; }
th.att-h { width: 13%; }
th.num-h { width: 7%; }
th.score-h { width: 8%; }
td { padding: 9px 3px; text-align: center; border-bottom: 1px solid #F1EFE8; vertical-align: middle; }
td.nm { text-align: left; padding-left: 10px; font-weight: 600; font-size: 14px; color: #2C2C2A; }
tr:last-child td { border-bottom: none; }
tr:nth-child(even) { background: #FAFAF8; }
tr.filled { background: #E1F5EE !important; }
select.att { font-size: 12px; padding: 4px; border: 1px solid #D3D1C7; border-radius: 6px; background: #fff; color: #2C2C2A; width: 100%; }
input.num { width: 100%; text-align: center; padding: 5px 2px; font-size: 13px; border: 1px solid #D3D1C7; border-radius: 6px; background: #fff; color: #2C2C2A; }
input.num:focus, select.att:focus { outline: none; border-color: #7F77DD; }
.score { font-weight: 700; font-size: 14px; color: #4F46E5; }
.total-row td { background: #EEF2FF !important; border-top: 2px solid #C7D2FE; font-weight: 700; }
.legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tag { font-size: 12px; color: #888780; background: #F1EFE8; padding: 4px 10px; border-radius: 20px; }
.tag.bonus { background: #FAEEDA; color: #854F0B; }
.submit-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; background: #4F46E5; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
.submit-btn:hover { background: #3C3489; }
.submit-btn:disabled { background: #888780; cursor: not-allowed; }
.toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 14px; padding: 14px 28px; border-radius: 20px; z-index: 999; text-align: center; line-height: 1.7; max-width: 90%; }
.toast.success { background: #0F6E56; }
.toast.error { background: #A32D2D; }
.toast.show { display: block; }
.filled-badge { font-size: 10px; background: #0F6E56; color: #fff; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
</style>
</head>
<body>
<h1 class="site-title">大展分會｜週報填寫系統</h1>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqDNDMdToOCU5BZSL3my9zeh1hyaGQpeOFfCf99yArkX2dTr8U-oQD_m8wMH4xYkpg9w/exec';

const groups = [
  { name:"第1組 基礎工程組", leader:"陳廣豪", members:["陳廣豪(組長)","世豪","韋旱","聖弘","志明","乙仙"] },
  { name:"第2組 裝修軟裝組", leader:"周宏南", members:["周宏南(組長)","文藝","宜圃","孫靜宜","張忠豪","昀宣"] },
  { name:"第3組 危老都更組", leader:"連雀伶", members:["連雀伶(組長)","耀元","吳文易","吳東欣","楊智凱","陳宥榛","張逸群"] },
  { name:"第4組 壽險不動產組", leader:"林聖嵐", members:["林聖嵐(組長)","國龍","金鈴","紀昀","乃慈","子靚","瑞慧"] },
  { name:"第5組 行銷品牌組", leader:"瑩潔", members:["瑩潔(組長)","美鳳","伯超","忠彬","艾薇","啟宏","陳俞甄"] },
  { name:"第6組 餐飲美食生產", leader:"李薏萱", members:["李薏萱(組長)","國鼎","曉萍","韋成","剛民","富貴"] },
  { name:"第7組 企業服務組", leader:"林俊宇", members:["林俊宇(組長)","濟棠","偉玉","奕賢","慧翎"] },
  { name:"第8組 健康美容組", leader:"邱從甯", members:["邱從甯(組長)","立杰","周延","葉禎","楚馨","淑英","人儀"] },
];

const mult = [5,5,10,10,15,20,30,5,5,10];

function calcRow(tr) {
  if(tr.querySelector('.att').value === '代理人') return 0;
  const nums = tr.querySelectorAll('.num');
  let t = 0;
  for(let i=0;i<mult.length;i++) t += (parseInt(nums[i].value)||0)*mult[i];
  return t;
}

function updateScore(el, gi, mi) {
  document.getElementById(`s-${gi}-${mi}`).textContent = calcRow(el.closest('tr'));
  updateGroupTotal(gi);
}

function updateGroupTotal(gi) {
  const tb = document.getElementById(`tb-${gi}`);
  const rows = Array.from(tb.querySelectorAll('tr')).filter(r => !r.classList.contains('total-row'));
  let grandTotal = 0;
  for(let c=0;c<mult.length;c++){
    let colSum = 0;
    rows.forEach(row => {
      const nums = row.querySelectorAll('.num');
      if(nums[c]) colSum += (parseInt(nums[c].value)||0);
    });
    document.getElementById(`gt-${gi}-${c}`).textContent = colSum;
    grandTotal += colSum * mult[c];
  }
  document.getElementById(`gt-${gi}-total`).textContent = grandTotal;
}

async function loadData(gi) {
  const g = groups[gi];
  const bar = document.getElementById(`status-${gi}`);
  bar.textContent = '載入中...';
  try {
    const res = await fetch(`${SCRIPT_URL}?group=${encodeURIComponent(g.name)}`);
    const json = await res.json();
    if(json.status === 'ok' && json.rows.length > 0) {
      json.rows.forEach(row => {
        const mi = g.members.findIndex(m => m === row['姓名']);
        if(mi < 0) return;
        const tr = document.getElementById(`tr-${gi}-${mi}`);
        if(!tr) return;
        const att = tr.querySelector('.att');
        const nums = tr.querySelectorAll('.num');
        if(att) att.value = row['出席狀況'] || '出席';
        const fields = ['一對一','促成一對一','引薦','跨產業引薦','成交','高品質引薦','來賓成交','參加培訓','群組分享','開鏡頭上台'];
        fields.forEach((f,i) => { if(nums[i]) nums[i].value = row[f] || 0; });
        document.getElementById(`s-${gi}-${mi}`).textContent = row['本週總分'] || 0;
        tr.classList.add('filled');
      });
      updateGroupTotal(gi);
      const filledCount = json.rows.length;
      bar.textContent = `✅ 已有 ${filledCount} 人填寫完成`;
      bar.style.background = '#E1F5EE';
      bar.style.color = '#0F6E56';
    } else {
      bar.textContent = '尚無人填寫';
    }
  } catch(e) {
    bar.textContent = '載入失敗，請重新整理';
  }
}

async function saveGroup(gi) {
  const btn = document.getElementById(`btn-${gi}`);
  btn.disabled = true;
  btn.textContent = '儲存中...';

  const g = groups[gi];
  const tb = document.getElementById(`tb-${gi}`);
  const rows = Array.from(tb.querySelectorAll('tr')).filter(r => !r.classList.contains('total-row'));

  const payload = {
    group: g.name,
    rows: rows.map((tr, mi) => {
      const nums = tr.querySelectorAll('.num');
      return {
        name: g.members[mi],
        att: tr.querySelector('.att').value,
        f0: parseInt(nums[0].value)||0,
        f1: parseInt(nums[1].value)||0,
        f2: parseInt(nums[2].value)||0,
        f3: parseInt(nums[3].value)||0,
        f4: parseInt(nums[4].value)||0,
        f5: parseInt(nums[5].value)||0,
        f6: parseInt(nums[6].value)||0,
        f7: parseInt(nums[7].value)||0,
        f8: parseInt(nums[8].value)||0,
        f9: parseInt(nums[9].value)||0,
        total: calcRow(tr)
      };
    })
  };

  try {
    // 用 iframe 方式送出，完全繞過 CORS 問題
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = 'hidden-iframe';
    form.style.display = 'none';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = JSON.stringify(payload);
    form.appendChild(input);
    document.body.appendChild(form);
    
    let iframe = document.getElementById('hidden-iframe');
    if(!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = 'hidden-iframe';
      iframe.id = 'hidden-iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }
    
    form.submit();
    document.body.removeChild(form);
    showToast('✅ 儲存成功！資料已寫入統計表\n📸 請截圖此頁面發到小組長群', 'success');
  } catch(err) {
    showToast('❌ 網路錯誤，請再試一次', 'error');
  }

  btn.disabled = false;
  btn.textContent = '✅ 儲存並截圖發組長群';
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.className = 'toast', 4000);
}

function buildGroup(g, gi) {
  const div = document.createElement('div');
  div.className = 'form-wrap';
  div.innerHTML = `
    <div class="top-bar">
      <h2>${g.name}｜週報</h2>
      <p>小組長：${g.leader}<br>
      📋 出席統計 & 競賽繳交：每週一晚上12:00前<br>
      ⚠️ 出席如需修改，週二中午12:00前仍可更改，過後座位確定排下去<br>
      📅 本表每週五更新，於組長群發送，請跟上最新版本<br>
      🙏 填表分數請真誠面對自己，填好自己的欄位即可！</p>
    </div>
    <div class="body">

      <div class="table-wrap">
        <table>
          <thead><tr>
            <th class="nm">姓名</th>
            <th class="att-h">出席</th>
            <th class="num-h">1對1<br>×5</th>
            <th class="num-h">促成<br>1對1<br>×5</th>
            <th class="num-h">引薦<br>×10</th>
            <th class="num-h">跨產業<br>×10</th>
            <th class="num-h">成交<br>×15</th>
            <th class="num-h">高品質<br>×20</th>
            <th class="num-h">來賓<br>×30</th>
            <th class="num-h">參加<br>培訓<br>+5</th>
            <th class="num-h">群組<br>分享<br>+5</th>
            <th class="num-h">開鏡頭<br>上台<br>+10</th>
            <th class="score-h">總分</th>
          </tr></thead>
          <tbody id="tb-${gi}"></tbody>
        </table>
      </div>
      <div class="legend">
        <span class="tag">1對1 ×5</span>
        <span class="tag">引薦 ×10</span>
        <span class="tag">成交 ×15</span>
        <span class="tag">高品質引薦 ×20</span>
        <span class="tag bonus">促成1對1 ×5</span>
        <span class="tag bonus">跨產業引薦 ×10</span>
        <span class="tag bonus">來賓成交 ×30</span>
        <span class="tag">培訓+5／分享+5／上台+10</span>
      </div>
      <button class="submit-btn" id="btn-${gi}" onclick="saveGroup(${gi})">✅ 儲存並截圖發組長群</button>
    </div>
  `;
  document.getElementById('root').appendChild(div);

  const tb = document.getElementById(`tb-${gi}`);
  g.members.forEach((m, mi) => {
    const tr = document.createElement('tr');
    tr.id = `tr-${gi}-${mi}`;
    const inputs = mult.map((_,i) =>
      `<input class="num" type="number" min="0" value="0" oninput="updateScore(this,${gi},${mi})">`
    ).join('</td><td>');
    tr.innerHTML = `
      <td class="nm">${m}</td>
      <td><select class="att" onchange="updateScore(this,${gi},${mi})">
        <option>出席</option><option>代理人</option>
      </select></td>
      <td>${inputs}</td>
      <td class="score" id="s-${gi}-${mi}">0</td>
    `;
    tb.appendChild(tr);
  });

  const totalRow = document.createElement('tr');
  totalRow.className = 'total-row';
  let totalHtml = `<td class="nm" style="color:#4F46E5;font-size:14px;">本週組合計</td><td style="color:#888780;font-size:12px;">—</td>`;
  for(let i=0;i<mult.length;i++) totalHtml += `<td class="score" id="gt-${gi}-${i}" style="font-size:13px;">0</td>`;
  totalHtml += `<td class="score" id="gt-${gi}-total" style="font-size:15px;">0</td>`;
  totalRow.innerHTML = totalHtml;
  tb.appendChild(totalRow);


}

groups.forEach((g,gi) => buildGroup(g,gi));
</script>
</body>
</html>
