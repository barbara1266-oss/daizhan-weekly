<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大展分會｜週報系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1A1A2E;--ink2:#3D3D5C;--muted:#8B8BA7;--line:#E8E8F0;
  --bg:#F4F4FA;--white:#FFFFFF;--brand:#4338CA;--brand2:#6D28D9;
  --green:#059669;--red:#DC2626;
}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--ink);padding:0 0 4rem;}

/* Header */
.site-header{background:linear-gradient(135deg,#312E81 0%,#4338CA 50%,#6D28D9 100%);padding:2rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden;}
.site-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.site-header h1{font-size:1.4rem;font-weight:900;color:#fff;letter-spacing:-0.02em;position:relative;}
.site-header p{font-size:0.75rem;color:rgba(255,255,255,0.65);margin-top:0.35rem;position:relative;}

/* 群組卡片 */
.gsec{max-width:780px;margin:1.5rem auto 0;padding:0 1rem;}
.gcard{background:var(--white);border-radius:16px;box-shadow:0 1px 3px rgba(26,26,46,.08),0 8px 24px rgba(26,26,46,.06);margin-bottom:2rem;overflow:hidden;border:1px solid var(--line);}
.ghead{background:linear-gradient(135deg,#312E81,#4338CA);padding:1rem 1.25rem;}
.ghead h2{font-size:1rem;font-weight:900;color:#fff;}
.ghead .meta{font-size:0.72rem;color:rgba(255,255,255,.7);margin-top:.35rem;line-height:1.8;}

/* 狀態列 */
.spill{margin:1rem 1.25rem 0;padding:.55rem 1rem;border-radius:50px;font-size:.78rem;font-weight:700;text-align:center;background:var(--bg);color:var(--muted);transition:all .3s;}
.spill.ok{background:#D1FAE5;color:#065F46;}
.spill.warn{background:#FEF3C7;color:#92400E;}
.spill.err{background:#FEE2E2;color:#991B1B;}

/* 計分說明 */
.sg{margin:.75rem 1.25rem 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.sg-toggle{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;font-size:.78rem;font-weight:700;color:var(--brand);background:#F0F0FF;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;border:none;width:100%;text-align:left;font-family:inherit;}
.sg-toggle .chev{font-size:.65rem;transition:transform .2s;}
.sg-toggle.open .chev{transform:rotate(180deg);}
.sg-body{display:none;padding:.75rem 1rem;background:#FAFAFE;}
.sg-body.open{display:block;}
.sg-div{font-size:.7rem;font-weight:700;color:var(--muted);margin:.4rem 0 .1rem;letter-spacing:.05em;}
.sg-row{display:flex;align-items:baseline;gap:.5rem;font-size:.75rem;color:var(--ink2);line-height:2;}
.sg-lbl{flex:1;}
.sg-pt{font-weight:700;color:var(--brand);white-space:nowrap;}
.sg-note{font-size:.68rem;color:var(--muted);padding-left:.6rem;border-left:2px solid var(--line);}

/* 桌面表格 */
.twrap{margin:.75rem 1.25rem 0;border:1px solid var(--line);border-radius:10px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:600px;table-layout:fixed;}
thead tr{background:var(--bg);}
th{padding:.6rem .2rem;font-size:.62rem;font-weight:700;color:var(--muted);text-align:center;border-bottom:1px solid var(--line);line-height:1.4;}
th.cn{text-align:left;padding-left:.75rem;width:14%;}
th.ca{width:11%;}
th.cm{width:6.5%;}
th.cs{width:7%;}
td{padding:.5rem .2rem;text-align:center;border-bottom:1px solid var(--bg);vertical-align:middle;}
td.cn{text-align:left;padding-left:.75rem;font-weight:700;font-size:.85rem;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even) td{background:#FAFAFE;}
tbody tr.filled td{background:#ECFDF5!important;}
tr.trow td{background:#EEF2FF!important;border-top:2px solid #C7D2FE;font-weight:700;}
select.att{width:100%;font-size:.75rem;padding:.3rem .2rem;border:1px solid var(--line);border-radius:6px;background:var(--white);cursor:pointer;min-height:32px;font-family:inherit;}
input.num{width:100%;text-align:center;font-size:.85rem;font-weight:600;padding:.3rem 0;border:1px solid var(--line);border-radius:6px;background:var(--white);min-height:32px;font-family:inherit;}
input.num:focus,select.att:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px rgba(67,56,202,.15);}
.scv{font-weight:900;font-size:.9rem;color:var(--brand);}

/* 手機卡片 */
.clist{margin:.75rem 1.25rem 0;display:none;}
.mcard{border:1px solid var(--line);border-radius:12px;margin-bottom:.75rem;overflow:hidden;background:var(--white);}
.mcard.filled{border-color:#6EE7B7;}
.mhead{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:var(--bg);border-bottom:1px solid var(--line);flex-wrap:wrap;}
.mname{font-weight:900;font-size:1.2rem;flex:1;min-width:70px;}
.mhead select.att{font-size:1rem;padding:.55rem .7rem;border:1.5px solid var(--line);border-radius:8px;background:var(--white);min-height:46px;min-width:88px;font-family:inherit;}
.mbadge{font-weight:900;font-size:1.25rem;color:var(--brand);background:#EEF2FF;padding:.3rem .85rem;border-radius:50px;white-space:nowrap;}
.mfields{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;padding:.85rem 1rem;}
.mfield{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.mfield label{font-size:.75rem;color:var(--muted);font-weight:700;text-align:center;line-height:1.4;}
.mfield input.num{width:100%;font-size:1.3rem;font-weight:700;padding:.7rem .2rem;min-height:52px;border:1.5px solid var(--line);border-radius:8px;-webkit-appearance:none;}

/* 手機合計 */
.mtcard{margin:0 1.25rem;display:none;border:2px solid #C7D2FE;border-radius:12px;background:#EEF2FF;padding:.75rem 1rem;}
.mtitle{font-size:.9rem;font-weight:700;color:var(--brand);margin-bottom:.5rem;}
.mgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;}
.mcell{text-align:center;}
.mcell span{font-size:.72rem;color:var(--muted);display:block;}
.mcell strong{font-size:1rem;color:var(--ink);}
.mgrand{margin-top:.6rem;font-size:1.3rem;font-weight:900;color:var(--brand);text-align:center;}

/* 儲存按鈕 */
.bwrap{margin:1rem 1.25rem 1.25rem;}
.sbtn{width:100%;padding:1rem;font-size:1rem;font-weight:900;font-family:inherit;background:linear-gradient(135deg,#4338CA,#6D28D9);color:#fff;border:none;border-radius:12px;cursor:pointer;min-height:52px;box-shadow:0 4px 14px rgba(67,56,202,.35);transition:transform .1s,box-shadow .1s,opacity .1s;-webkit-tap-highlight-color:transparent;}
.sbtn:hover{box-shadow:0 6px 20px rgba(67,56,202,.45);}
.sbtn:active{transform:scale(.98);box-shadow:0 2px 8px rgba(67,56,202,.3);}
.sbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* Toast */
#toast{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:.85rem 1.5rem;border-radius:50px;font-size:.85rem;font-weight:700;font-family:inherit;color:#fff;z-index:9999;text-align:center;max-width:88vw;line-height:1.6;box-shadow:0 8px 30px rgba(0,0,0,.2);white-space:pre-line;}
#toast.ok{background:#065F46;display:block;}
#toast.err{background:#991B1B;display:block;}
#toast.info{background:var(--brand);display:block;}

/* RWD */
@media(max-width:639px){
  body{padding-bottom:5rem;}
  .gsec{padding:0 .75rem;}
  .twrap{display:none;}
  .clist{display:block;}
  .mtcard{display:block;margin-top:.75rem;}
  .sbtn{font-size:1.05rem;min-height:56px;}
}
@media(min-width:640px){
  .clist,.mtcard{display:none!important;}
}
</style>
</head>
<body>

<header class="site-header">
  <h1>🏆 大展分會｜週報填寫系統</h1>
  <p>填好自己欄位 → 按儲存 → 截圖發組長群，三步完成！</p>
</header>

<div class="gsec" id="root"></div>
<div id="toast"></div>

<script>
'use strict';

// ══ 唯一需要改的設定 ══
var GAS_URL = 'https://script.google.com/macros/s/AKfycbz6K4xqOh-g4p4jrp8gtdLysi_ZfSJHQ_XiA7Nv96qphoOz-Bc18UcI7gc_ElL_NaCRuQ/exec';

var GROUPS = [
  {name:'第1組 基礎工程組',   leader:'陳廣豪', members:['陳廣豪(組長)','世豪','韋旱','聖弘','志明','乙仙']},
  {name:'第2組 裝修軟裝組',   leader:'周宏南', members:['周宏南(組長)','文藝','宜圃','孫靜宜','張忠豪','昀宣','吳家翰']},
  {name:'第3組 危老都更組',   leader:'連雀伶', members:['連雀伶(組長)','耀元','吳文易','吳東欣','楊智凱','陳宥榛','張逸群']},
  {name:'第4組 壽險不動產組', leader:'林聖嵐', members:['林聖嵐(組長)','國龍','金鈴','紀昀','乃慈','子靚','瑞慧']},
  {name:'第5組 行銷品牌組',   leader:'瑩潔',   members:['瑩潔(組長)','美鳳','伯超','忠彬','艾薇','啟宏','陳俞甄']},
  {name:'第6組 餐飲美食生產', leader:'李薏萱', members:['李薏萱(組長)','國鼎','曉萍','韋成','剛民','富貴']},
  {name:'第7組 企業服務組',   leader:'林俊宇', members:['林俊宇(組長)','濟棠','偉玉','奕賢','慧翎']},
  {name:'第8組 健康美容組',   leader:'邱從甯', members:['邱從甯(組長)','立杰','周延','葉禎','楚馨','淑英','人儀']},
];

// 改競賽只動這三個陣列
var KEYS   = ['一對一','促成一對一','引薦','跨產業引薦','成交','高品質引薦','來賓成交','參加培訓','群組分享','開鏡頭上台'];
var LABELS = ['1對1','促成\n1對1','引薦','跨產業\n引薦','成交','高品質\n引薦','來賓\n成交','參加\n培訓','群組\n分享','開鏡頭\n上台'];
var THDR   = ['1對1<br>×5','促成<br>1對1<br>×5','引薦<br>×10','跨產業<br>×10','成交<br>×15','高品質<br>×20','來賓<br>×30','培訓<br>+5','分享<br>+5','上台<br>+10'];
var MULT   = [5,5,10,10,15,20,30,5,5,10];

var GUIDE =
  '<div class="sg-div">（一）培訓</div>'+
  '<div class="sg-row"><span class="sg-lbl">參加內部培訓</span><span class="sg-pt">+5 分</span></div>'+
  '<div class="sg-row"><span class="sg-lbl">培訓後於群組分享心得</span><span class="sg-pt">+5 分</span></div>'+
  '<div class="sg-row"><span class="sg-lbl">開鏡頭點名分享 / 實體上台（教育單元）</span><span class="sg-pt">+10 分</span></div>'+
  '<div class="sg-row"><span class="sg-lbl">完成 1 對 1</span><span class="sg-pt">+5 分</span></div>'+
  '<div class="sg-div" style="margin-top:.5rem">（二）引薦</div>'+
  '<div class="sg-row"><span class="sg-lbl">一般引薦</span><span class="sg-pt">+10 分</span></div>'+
  '<div class="sg-row"><span class="sg-lbl">成交</span><span class="sg-pt">+15 分</span></div>'+
  '<div class="sg-row"><span class="sg-lbl">高品質引薦</span><span class="sg-pt">+20 分</span></div>'+
  '<div class="sg-note">需有對方 Line 回覆截圖，證明為高品質引薦</div>'+
  '<div class="sg-div" style="margin-top:.5rem">（三）加分任務</div>'+
  '<div class="sg-row"><span class="sg-lbl">協助來賓成交</span><span class="sg-pt">+30 分</span></div>'+
  '<div class="sg-row"><span class="sg-lbl">跨產業引薦</span><span class="sg-pt">+10 分</span></div>'+
  '<div class="sg-note">需說明跨產業對象為誰</div>'+
  '<div class="sg-row"><span class="sg-lbl">協助促成 1 對 1</span><span class="sg-pt">+5 分</span></div>';

// ── Toast ──
var _tt;
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className=type;clearTimeout(_tt);_tt=setTimeout(function(){el.className='';},4500);}

// ── 核心 1：加總 ──
function score(gi,mi){
  var tr=document.getElementById('tr'+gi+'_'+mi);
  if(!tr||tr.querySelector('.att').value==='代理人')return 0;
  var s=0;tr.querySelectorAll('input.num').forEach(function(n,i){s+=(parseInt(n.value)||0)*MULT[i];});return s;
}
function refreshScore(gi,mi){
  var v=score(gi,mi);
  var s=document.getElementById('sc'+gi+'_'+mi);if(s)s.textContent=v;
  var b=document.getElementById('mb'+gi+'_'+mi);if(b)b.textContent=v+' 分';
  refreshTotal(gi);
}
function refreshTotal(gi){
  var grand=0;
  for(var c=0;c<MULT.length;c++){
    var col=0;
    for(var mi=0;mi<GROUPS[gi].members.length;mi++){
      var tr=document.getElementById('tr'+gi+'_'+mi);if(!tr)continue;
      col+=(parseInt(tr.querySelectorAll('input.num')[c].value)||0);
    }
    var t1=document.getElementById('gt'+gi+'_'+c);if(t1)t1.textContent=col;
    var t2=document.getElementById('mc'+gi+'_'+c);if(t2)t2.textContent=col;
    grand+=col*MULT[c];
  }
  var g1=document.getElementById('grand'+gi);if(g1)g1.textContent=grand;
  var g2=document.getElementById('mgrand'+gi);if(g2)g2.textContent=grand;
}

// ── 雙向同步 ──
function cNum(gi,mi,fi,v){var tr=document.getElementById('tr'+gi+'_'+mi);if(!tr)return;tr.querySelectorAll('input.num')[fi].value=v;refreshScore(gi,mi);}
function cAtt(gi,mi,v){var tr=document.getElementById('tr'+gi+'_'+mi);if(!tr)return;tr.querySelector('.att').value=v;refreshScore(gi,mi);}
function push(gi){
  GROUPS[gi].members.forEach(function(m,mi){
    var tr=document.getElementById('tr'+gi+'_'+mi);if(!tr)return;
    var card=document.getElementById('card'+gi+'_'+mi);if(!card)return;
    var tn=tr.querySelectorAll('input.num'),cn=card.querySelectorAll('input.num');
    tn.forEach(function(n,i){if(cn[i])cn[i].value=n.value;});
    var ta=tr.querySelector('.att'),ca=card.querySelector('.att');
    if(ca&&ta)ca.value=ta.value;
    refreshScore(gi,mi);
  });
}

// ── 核心 2：儲存 → GAS（單一 fetch，明確回應）──
function save(gi){
  var g=GROUPS[gi],btn=document.getElementById('btn'+gi);
  btn.disabled=true;btn.textContent='⏳ 儲存中...';
  toast('⏳ 傳送中，請稍候...','info');

  var rows=g.members.map(function(m,mi){
    var tr=document.getElementById('tr'+gi+'_'+mi);
    var nums=tr.querySelectorAll('input.num');
    var row={name:m,att:tr.querySelector('.att').value,total:score(gi,mi)};
    KEYS.forEach(function(k,i){row['f'+i]=parseInt(nums[i].value)||0;});
    return row;
  });

  var url=GAS_URL+'?action=save&data='+encodeURIComponent(JSON.stringify({group:g.name,rows:rows}));
  fetch(url,{method:'GET',mode:'cors',cache:'no-cache'})
    .then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();})
    .then(function(json){
      if(json&&json.status==='ok'){
        g.members.forEach(function(m,mi){
          var tr=document.getElementById('tr'+gi+'_'+mi);if(tr)tr.classList.add('filled');
          var card=document.getElementById('card'+gi+'_'+mi);if(card)card.classList.add('filled');
        });
        toast('✅ 儲存成功！\n📸 請截圖此頁面發組長群','ok');
        setTimeout(function(){load(gi);},1800);
      }else{throw new Error(json&&json.message?json.message:'未知錯誤');}
    })
    .catch(function(err){console.error('[save]',err);toast('❌ 儲存失敗！\n請確認網路後再按一次','err');})
    .finally(function(){btn.disabled=false;btn.textContent='✅ 儲存並截圖發組長群';});
}

// ── 核心 3：讀取（Sheets 清空 → 自動歸零）──
function load(gi){
  var g=GROUPS[gi],st=document.getElementById('st'+gi);
  if(st){st.textContent='🔄 讀取中...';st.className='spill';}
  // 先歸零
  g.members.forEach(function(m,mi){
    var tr=document.getElementById('tr'+gi+'_'+mi);if(!tr)return;
    tr.querySelector('.att').value='出席';
    tr.querySelectorAll('input.num').forEach(function(n){n.value='0';});
    tr.classList.remove('filled');
    var card=document.getElementById('card'+gi+'_'+mi);if(card)card.classList.remove('filled');
  });
  refreshTotal(gi);

  fetch(GAS_URL+'?action=load&group='+encodeURIComponent(g.name),{method:'GET',mode:'cors',cache:'no-cache'})
    .then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();})
    .then(function(json){
      if(json&&json.status==='ok'&&json.rows&&json.rows.length>0){
        var cnt=0;
        json.rows.forEach(function(row){
          var mi=-1;
          for(var i=0;i<g.members.length;i++){if(g.members[i]===row['姓名']){mi=i;break;}}
          if(mi<0)return;
          var tr=document.getElementById('tr'+gi+'_'+mi);if(!tr)return;
          var att=tr.querySelector('.att'),nums=tr.querySelectorAll('input.num');
          if(att)att.value=row['出席狀況']||'出席';
          KEYS.forEach(function(k,i){if(nums[i])nums[i].value=row[k]||0;});
          tr.classList.add('filled');
          var card=document.getElementById('card'+gi+'_'+mi);if(card)card.classList.add('filled');
          cnt++;
        });
        push(gi);
        if(st){st.textContent='✅ 已有 '+cnt+' 人填寫 / 共 '+g.members.length+' 人';st.className='spill ok';}
      }else{
        push(gi);
        if(st){st.textContent='📭 本週尚無填寫記錄';st.className='spill';}
      }
    })
    .catch(function(err){
      console.warn('[load]',err);
      push(gi);
      if(st){st.textContent='⚠️ 後台讀取失敗，請重新整理';st.className='spill warn';}
    });
}

// ── 建立 UI ──
function build(g,gi){
  var mTC=LABELS.map(function(l,i){return '<div class="mcell"><span>'+l.replace(/\n/g,'<br>')+'</span><strong id="mc'+gi+'_'+i+'">0</strong></div>';}).join('');
  var wrap=document.createElement('div');wrap.className='gcard';
  wrap.innerHTML=
    '<div class="ghead"><h2>'+g.name+'　｜　週報</h2>'+
    '<div class="meta">小組長：'+g.leader+'　▸　📋 出席＆競賽繳交：每週一晚上 12:00 前<br>'+
    '⚠️ 出席修改截止：週二中午 12:00（過後座位確定）<br>'+
    '📅 本表每週五更新，請使用最新版　🙏 真誠填好自己欄位即可</div></div>'+
    '<div class="spill" id="st'+gi+'">🔄 讀取中...</div>'+
    '<div class="sg"><button class="sg-toggle" id="sg'+gi+'" type="button"><span>📋 計分項目說明（點此展開）</span><span class="chev">▾</span></button>'+
    '<div class="sg-body" id="sgb'+gi+'">'+GUIDE+'</div></div>'+
    '<div class="twrap"><table><thead><tr><th class="cn">姓名</th><th class="ca">出席</th>'+
    THDR.map(function(h){return '<th class="cm">'+h+'</th>';}).join('')+
    '<th class="cs">總分</th></tr></thead><tbody id="tb'+gi+'"></tbody></table></div>'+
    '<div class="clist" id="cl'+gi+'"></div>'+
    '<div class="mtcard" id="mtc'+gi+'"><div class="mtitle">📊 本週組合計</div>'+
    '<div class="mgrid">'+mTC+'</div><div class="mgrand">總分：<span id="mgrand'+gi+'">0</span></div></div>'+
    '<div class="bwrap"><button class="sbtn" id="btn'+gi+'" type="button">✅ 儲存並截圖發組長群</button></div>';
  document.getElementById('root').appendChild(wrap);

  // 折疊
  (function(gIdx){
    var t=document.getElementById('sg'+gIdx),b=document.getElementById('sgb'+gIdx);
    t.addEventListener('click',function(){var o=b.classList.contains('open');b.classList.toggle('open',!o);t.classList.toggle('open',!o);});
  })(gi);
  // 儲存
  (function(gIdx){document.getElementById('btn'+gIdx).addEventListener('click',function(){save(gIdx);});})(gi);

  // 桌面 tbody
  var tb=document.getElementById('tb'+gi);
  g.members.forEach(function(m,mi){
    var tr=document.createElement('tr');tr.id='tr'+gi+'_'+mi;
    var nd=document.createElement('td');nd.className='cn';nd.textContent=m;tr.appendChild(nd);
    var ad=document.createElement('td');
    var sel=document.createElement('select');sel.className='att';
    ['出席','代理人'].forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);});
    (function(gIdx,mIdx){sel.addEventListener('change',function(){refreshScore(gIdx,mIdx);});})(gi,mi);
    ad.appendChild(sel);tr.appendChild(ad);
    MULT.forEach(function(_,fi){
      var td=document.createElement('td');
      var inp=document.createElement('input');inp.type='number';inp.className='num';inp.min='0';inp.value='0';inp.inputMode='numeric';
      (function(gIdx,mIdx){inp.addEventListener('input',function(){if(parseInt(this.value)<0)this.value='0';refreshScore(gIdx,mIdx);});})(gi,mi);
      td.appendChild(inp);tr.appendChild(td);
    });
    var sd=document.createElement('td');sd.className='scv';sd.id='sc'+gi+'_'+mi;sd.textContent='0';tr.appendChild(sd);
    tb.appendChild(tr);
  });
  // 合計列
  var tot=document.createElement('tr');tot.className='trow';
  var t1=document.createElement('td');t1.className='cn';t1.style.color='var(--brand)';t1.textContent='本週組合計';tot.appendChild(t1);
  var t2=document.createElement('td');t2.style.color='var(--muted)';t2.textContent='—';tot.appendChild(t2);
  MULT.forEach(function(_,i){var td=document.createElement('td');td.className='scv';td.id='gt'+gi+'_'+i;td.textContent='0';tot.appendChild(td);});
  var gd=document.createElement('td');gd.className='scv';gd.id='grand'+gi;gd.style.fontSize='1rem';gd.textContent='0';tot.appendChild(gd);
  tb.appendChild(tot);

  // 手機卡片
  var cl=document.getElementById('cl'+gi);
  g.members.forEach(function(m,mi){
    var card=document.createElement('div');card.className='mcard';card.id='card'+gi+'_'+mi;
    var fh=LABELS.map(function(l,i){return '<div class="mfield"><label>'+l.replace(/\n/g,'<br>')+'</label><input class="num" type="number" inputmode="numeric" min="0" value="0"></div>';}).join('');
    card.innerHTML='<div class="mhead"><span class="mname">'+m+'</span><select class="att"><option>出席</option><option>代理人</option></select><span class="mbadge" id="mb'+gi+'_'+mi+'">0 分</span></div><div class="mfields">'+fh+'</div>';
    (function(gIdx,mIdx){
      card.querySelector('.att').addEventListener('change',function(){cAtt(gIdx,mIdx,this.value);});
      card.querySelectorAll('input.num').forEach(function(inp,fi){inp.addEventListener('input',function(){if(parseInt(this.value)<0)this.value='0';cNum(gIdx,mIdx,fi,this.value);});});
    })(gi,mi);
    cl.appendChild(card);
  });

  load(gi);
}

GROUPS.forEach(function(g,gi){build(g,gi);});
</script>
</body>
</html>
